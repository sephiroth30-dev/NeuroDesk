<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroDesk — Acceso</title>
    <style>
      :root {
        --bg: #F5F5F2;
        --surface: #FFFFFF;
        --text: #1C1C1E;
        --muted: #6E6E73;
        --line: rgba(60, 60, 67, 0.10);
        --accent: #0A6BFF;
        --accent-hover: #0857D6;
        --danger: #FF3B30;
        --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: var(--font);
        padding: 24px 16px;
      }

      .card {
        width: min(440px, 100%);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        padding: 32px 36px 36px;
        position: relative;
      }

      .cardTop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
      }

      .brandRow {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logoBox {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: #1C1C1E;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        color: #fff;
      }

      .logoBox svg { display: block; }

      .brandName {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .appVersion {
        font-size: 0.72rem;
        color: var(--muted);
        font-weight: 500;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 28px;
        line-height: 1.4;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #FAFAF9;
        font: inherit;
        font-size: 0.938rem;
        font-weight: 400;
        color: var(--text);
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        text-transform: none;
        letter-spacing: normal;
      }

      input::placeholder {
        color: #C0C0C5;
        font-weight: 400;
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(10, 107, 255, 0.14);
        background: #fff;
      }

      .passwordWrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .passwordWrapper input {
        padding-right: 44px;
      }
      .eyeBtn {
        position: absolute;
        right: 10px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: var(--muted);
        display: flex;
        align-items: center;
        border-radius: 4px;
        transition: color 0.15s;
      }
      .eyeBtn:hover { color: var(--accent); }

      button[type="submit"] {
        margin-top: 4px;
        padding: 13px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-size: 0.938rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.15s;
        letter-spacing: -0.01em;
      }

      button[type="submit"]:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }
      button[type="submit"]:active { transform: translateY(0); }

      .error {
        font-size: 0.84rem;
        color: var(--danger);
        min-height: 18px;
        text-align: center;
        font-weight: 500;
        text-transform: none;
        letter-spacing: normal;
      }

      .cardFooter {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        font-size: 0.8rem;
      }

      .cardFooter a {
        text-decoration: none;
        color: var(--accent);
        font-weight: 600;
        transition: opacity 0.13s;
      }
      .cardFooter a:hover { opacity: 0.75; }

      .cardFooter .portalLink {
        color: var(--muted);
        font-weight: 500;
      }

      @media (max-width: 480px) {
        .card { padding: 24px 20px 28px; }
        h1 { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="cardTop">
        <div class="brandRow">
          <div class="logoBox">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1.5" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" />
            </svg>
          </div>
          <span class="brandName">NeuroDesk</span>
        </div>
        <span class="appVersion" id="loginVersion"></span>
      </div>

      <h1>Iniciar sesión</h1>
      <p class="subtitle">Ingresa con tu cuenta del equipo interno.</p>

      <form id="loginForm" autocomplete="off" novalidate>
        <label>
          Usuario
          <input id="username" type="text" autocomplete="username" placeholder="admin" required />
        </label>
        <label>
          Contraseña
          <div class="passwordWrapper">
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              class="eyeBtn"
              id="toggleLoginPassword"
              title="Mostrar/ocultar contraseña"
            ></button>
          </div>
        </label>
        <button type="submit">Continuar</button>
        <p id="loginError" class="error" role="alert"></p>
      </form>

      <div class="cardFooter">
        <a href="/reset-password">Restablecer contraseña</a>
        <a href="/portal" target="_blank" class="portalLink">Portal de clientes ↗</a>
      </div>
    </div>

    <script>
      const EYE_OPEN = `<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      const EYE_CLOSED = `<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

      const toggleBtn = document.getElementById("toggleLoginPassword");
      const passInput = document.getElementById("password");
      toggleBtn.innerHTML = EYE_OPEN;
      toggleBtn.addEventListener("click", () => {
        if (passInput.type === "password") {
          passInput.type = "text";
          toggleBtn.innerHTML = EYE_CLOSED;
        } else {
          passInput.type = "password";
          toggleBtn.innerHTML = EYE_OPEN;
        }
      });

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById("loginError");
        const btn = e.target.querySelector("button[type='submit']");
        errorEl.textContent = "";
        btn.textContent = "Verificando…";
        btn.disabled = true;

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("username").value,
              password: document.getElementById("password").value,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            errorEl.textContent = data.error || "Error al ingresar.";
            btn.textContent = "Continuar";
            btn.disabled = false;
            return;
          }
          window.location.replace("/");
        } catch {
          errorEl.textContent = "Error de conexión con el servidor.";
          btn.textContent = "Continuar";
          btn.disabled = false;
        }
      });

      fetch("/api/version")
        .then((r) => r.json())
        .then((d) => {
          const el = document.getElementById("loginVersion");
          if (el) el.textContent = "v" + d.version;
        })
        .catch(() => {});
    </script>
  </body>
</html>
